<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MonthLow · 近N日低点选股</title>
  <style>
    :root {
      --bg:#050505;
      --bg-2:#0d0d0f;
      --panel:#141416;
      --panel-strong:#19191c;
      --panel-soft:#101012;
      --line:#232327;
      --line-2:#2d2d33;
      --text1:#f5f5f7;
      --text2:#b8b8c2;
      --text3:#73737c;
      --blue:#8a72ff;
      --blue-strong:#775cff;
      --blue-lt:rgba(123,97,255,.16);
      --green:#21e6a6;
      --red:#ff5f7a;
      --amber:#ffc96b;
      --white:#ffffff;
      --shadow:0 18px 40px rgba(0,0,0,.28);
      --radius:18px;
    }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:"PingFang SC","Helvetica Neue",Arial,sans-serif;
           background:
             radial-gradient(circle at top center, rgba(123,97,255,.08), transparent 18%),
             linear-gradient(180deg, #090909 0%, #040404 100%);
           color:var(--text1); min-height:100vh; overflow:hidden; }

    .app-shell { display:flex; min-height:100vh; }
    .sidebar {
      width:220px; flex-shrink:0; padding:24px 14px;
      background:linear-gradient(180deg, #101012, #09090a);
      border-right:1px solid var(--line);
      box-shadow:inset -1px 0 0 rgba(255,255,255,.03);
      display:flex; flex-direction:column;
    }
    .menu-card {
      flex:1;
      background:#121214; border:1px solid var(--line);
      border-radius:20px; padding:18px; box-shadow:var(--shadow);
      display:flex; flex-direction:column;
    }
    .menu-title {
      font-size:11px; text-transform:uppercase; letter-spacing:.16em; color:var(--text3);
      margin-bottom:14px;
    }
    .tree { position:relative; padding-left:12px; }
    .tree::before {
      content:""; position:absolute; left:5px; top:8px; bottom:8px; width:1px;
      background:linear-gradient(180deg, rgba(138,114,255,.45), rgba(138,114,255,0));
    }
    .tree-link {
      position:relative; display:flex; align-items:center; gap:10px; margin-bottom:10px;
      padding:12px 14px 12px 18px; border-radius:14px; color:var(--text2); text-decoration:none;
      border:1px solid transparent; transition:all .18s ease;
      background:rgba(255,255,255,.015);
    }
    .tree-link::before {
      content:""; position:absolute; left:-11px; top:50%; width:14px; height:1px;
      background:rgba(138,114,255,.45);
    }
    .tree-link:hover {
      color:var(--text1); border-color:rgba(138,114,255,.2); background:rgba(255,255,255,.035);
      transform:translateX(2px);
    }
    .tree-link.active {
      color:var(--text1);
      background:linear-gradient(135deg, rgba(123,97,255,.18), rgba(123,97,255,.08));
      border-color:rgba(138,114,255,.34);
      box-shadow:0 0 0 1px rgba(138,114,255,.08) inset, 0 12px 24px rgba(0,0,0,.28);
    }
    .tree-link span:last-child { font-weight:600; }

    .workspace {
      flex:1; min-width:0; padding:24px; display:flex; flex-direction:column; overflow:hidden;
    }

    .layout { display:flex; flex:1; gap:18px; min-height:0; overflow:hidden; }

    /* 左侧面板 */
    .left-panel { width:320px; display:flex; flex-direction:column;
                  overflow:hidden; flex-shrink:0; gap:16px; padding-right:4px; min-height:0; }
    .panel-section {
      padding:18px; border:1px solid rgba(86,111,160,.2);
      background:linear-gradient(180deg, #141416, #101012);
      border-radius:22px; box-shadow:var(--shadow); min-height:0; flex-shrink:0;
    }
    .section-title { font-size:13px; font-weight:600; color:var(--text2);
                     margin-bottom:12px; display:flex; align-items:center; gap:6px; }

    /* 筛选条件 */
    .filter-row { display:flex; align-items:center; gap:8px; margin-bottom:10px; }
    .filter-label { font-size:13px; color:var(--text2); white-space:nowrap; }
    .filter-input { width:72px; height:36px; border:1px solid var(--line-2);
                    border-radius:12px; padding:0 8px; font-size:14px;
                    background:rgba(255,255,255,.03); color:var(--text1); outline:none; text-align:center; }
    .filter-input:focus { border-color:var(--blue-strong); box-shadow:0 0 0 3px rgba(47,140,255,.12); }
    .filter-unit { font-size:13px; color:var(--text3); }

    /* 日期选择 */
    .date-picker {
      width:100%; height:40px; border:1px solid var(--line-2); border-radius:12px;
      padding:0 12px; background:rgba(255,255,255,.03); color:var(--text1); outline:none;
      font-size:14px;
    }
    .picker-hint { margin-top:10px; font-size:12px; color:var(--text3); line-height:1.6; }

    /* 统计 */
    .stat-grid { display:grid; grid-template-columns:repeat(4, minmax(0, 1fr)); gap:8px; }
    .stat-card { background:rgba(255,255,255,.03); border-radius:16px; padding:12px; border:1px solid rgba(88,112,160,.14); }
    .stat-label { font-size:11px; color:var(--text3); margin-bottom:4px; }
    .stat-val { font-size:18px; font-weight:700; color:var(--text1); }
    .stat-val.blue  { color:var(--blue); }
    .stat-val.green { color:var(--green); }
    .stat-val.red   { color:var(--red); }

    /* 日志 */
    .log-panel {
      flex:1 1 auto; min-height:0; display:flex; flex-direction:column; overflow:hidden;
    }
    .log-box { background:rgba(4,10,18,.9); border:1px solid rgba(80,105,150,.16); border-radius:16px; padding:12px;
               font-family:"SF Mono","Fira Code",monospace; font-size:11px;
               color:#C9CDD4; flex:1; min-height:0; overflow-y:auto;
               white-space:pre-wrap; word-break:break-all; }
    .log-box::-webkit-scrollbar { width:8px; }
    .log-box::-webkit-scrollbar-thumb { background:rgba(138,114,255,.35); border-radius:999px; }
    .log-box::-webkit-scrollbar-track { background:rgba(255,255,255,.03); border-radius:999px; }
    .log-done { color:#00B42A; } .log-err { color:#F53F3F; }

    /* 按钮 */
    .btn { display:inline-flex; align-items:center; gap:6px; padding:7px 16px;
           border-radius:14px; border:none; cursor:pointer; font-size:13px;
           font-weight:500; transition:all .15s; }
    .btn:disabled { opacity:.5; cursor:not-allowed; }
    .btn-primary {
      background:linear-gradient(135deg, #6f57ff, #8a72ff);
      color:#f8f7ff; justify-content:center; font-weight:700;
      box-shadow:0 10px 28px rgba(111,87,255,.24);
    }
    .btn-primary:hover:not(:disabled) { filter:brightness(1.05); transform:translateY(-1px); }
    .btn-ghost { background:rgba(255,255,255,.03); color:var(--blue); border:1px solid rgba(138,114,255,.24); }
    .btn-ghost:hover:not(:disabled) { background:var(--blue-lt); }

    /* 右侧内容 */
    .right-panel {
      flex:1; min-width:0; min-height:0; display:flex; flex-direction:column; overflow:hidden;
      background:linear-gradient(180deg, #111113, #09090b);
      border:1px solid rgba(86,111,160,.2); border-radius:24px; box-shadow:var(--shadow);
    }

    /* 表格区 */
    .table-wrap { flex:1; overflow-y:auto; }
    .table-header { padding:18px 22px; border-bottom:1px solid var(--line);
                    display:flex; align-items:center; justify-content:space-between;
                    background:rgba(255,255,255,.015); flex-shrink:0; gap:16px; flex-wrap:wrap; }
    .table-title { font-size:15px; font-weight:600; color:var(--text1); }
    .table-count { font-size:13px; color:var(--text3); }

    table { width:100%; border-collapse:collapse; font-size:13px; }
    thead th { background:#0f0f12; color:var(--text3); font-weight:500;
               padding:12px 14px; text-align:left; border-bottom:1px solid var(--line);
               white-space:nowrap; position:sticky; top:0; z-index:1; }
    tbody tr { border-bottom:1px solid rgba(32,47,78,.72); transition:background .1s; }
    tbody tr:last-child { border-bottom:none; }
    tbody tr:hover { background:rgba(255,255,255,.02); }
    tbody tr.empty-row:hover { background:transparent; }
    tbody td { padding:12px 14px; white-space:nowrap; color:var(--text2); }

    .code-cell { font-family:"SF Mono",monospace; font-weight:600; color:var(--blue);
                 font-size:13px; cursor:pointer; text-decoration:underline dotted; }
    input[type=checkbox] { width:15px; height:15px; cursor:pointer; accent-color:var(--blue); }
    .th-check, .td-check { width:36px; text-align:center; }
    .pct-pos { color:var(--red); font-weight:600; }
    .pct-neg { color:var(--green); font-weight:600; }
    .pct-zero { color:var(--text3); }

    /* 分页 */
    .pagination { padding:14px 20px; border-top:1px solid var(--line);
                  display:flex; align-items:center; justify-content:space-between;
                  background:rgba(255,255,255,.015); flex-shrink:0; }
    .page-info { font-size:13px; color:var(--text3); }
    .page-btns { display:flex; gap:4px; }
    .page-btn { width:34px; height:34px; border-radius:12px;
                border:1px solid var(--line-2); background:rgba(255,255,255,.03);
                color:var(--text2); cursor:pointer; font-size:13px;
                display:flex; align-items:center; justify-content:center;
                transition:all .15s; }
    .page-btn:hover { border-color:var(--blue); color:var(--blue); }
    .page-btn.active { background:linear-gradient(135deg, #6f57ff, #8a72ff); border-color:transparent;
                       color:#f8f7ff; font-weight:700; }
    .page-btn:disabled { opacity:.4; cursor:not-allowed; }

    .empty-state { padding:64px 0; text-align:center; color:var(--text3); }
    .empty-state .icon { font-size:36px; margin-bottom:10px; }
    .empty-state p { font-size:14px; }

    /* K线浮层 */
    #kline-popup { position:fixed; z-index:500; background:#0b1628;
                   border:1px solid var(--line-2); border-radius:16px;
                   box-shadow:0 8px 24px rgba(0,0,0,.12); padding:10px;
                   display:none; pointer-events:none; }
    #kline-popup .kline-title { font-size:12px; color:var(--text2);
                                margin-bottom:6px; font-weight:500; }
    #kline-popup img { display:block; width:380px; height:auto; border-radius:4px; }

    /* Toast */
    #toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
             background:rgba(29,33,41,.9); color:#fff; padding:8px 18px;
             border-radius:20px; font-size:13px; opacity:0; transition:opacity .3s;
             pointer-events:none; z-index:999; white-space:nowrap; }
    #toast.show { opacity:1; }

    @media (max-width: 1100px) {
      .app-shell { flex-direction:column; }
      .sidebar {
        width:auto; padding:16px 16px 10px; border-right:none; border-bottom:1px solid rgba(92,122,173,.18);
      }
      .workspace { padding:16px; }
      .layout { flex-direction:column; }
      .left-panel, .right-panel { width:auto; }
      .stat-grid { grid-template-columns:1fr 1fr; }
    }
  </style>
</head>
<body>
<div class="app-shell">
  <aside class="sidebar">
    <div class="menu-card">
      <div class="menu-title">系统菜单</div>
      <div class="tree">
        <a class="tree-link active" href="/month_low"><span>📉</span><span>筛选</span></a>
        <a class="tree-link" href="/watchlist"><span>📌</span><span>自选</span></a>
        <a class="tree-link" href="/position"><span>💼</span><span>持仓</span></a>
      </div>
    </div>
  </aside>

  <main class="workspace">
    <div class="layout">

  <!-- 左侧面板 -->
  <div class="left-panel">

    <!-- 筛选条件 -->
    <div class="panel-section">
      <div class="section-title">⚙️ 筛选条件</div>
      <div class="filter-row">
        <span class="filter-label">近</span>
        <input class="filter-input" type="number" id="input-lookback" value="10" min="1" max="250" />
        <span class="filter-unit">个交易日新低</span>
      </div>
      <button class="btn btn-primary" id="btn-run" onclick="runScan()" style="margin-top:4px;width:100%">▶ 立即扫描</button>
    </div>

    <!-- 日期选择 -->
    <div class="panel-section">
      <div class="section-title" style="justify-content:space-between">
        📅 历史日期
        <span style="font-size:12px;font-weight:400;color:var(--text3);cursor:pointer" onclick="loadDates()">↻ 刷新</span>
      </div>
      <input class="date-picker" type="date" id="date-picker" onchange="onDatePicked(this.value)" />
      <div class="picker-hint" id="date-picker-hint">加载中...</div>
    </div>

    <!-- 扫描日志 -->
    <div class="panel-section log-panel" id="log-section" style="display:none">
      <div class="section-title">📋 扫描日志</div>
      <div class="log-box" id="log-panel"></div>
    </div>

  </div>

  <!-- 右侧结果 -->
  <div class="right-panel">
    <div class="panel-section" id="stat-section" style="display:none;border:none;border-bottom:1px solid var(--line);border-radius:0;box-shadow:none;background:transparent">
      <div class="section-title">📊 本次统计</div>
      <div class="stat-grid">
        <div class="stat-card">
          <div class="stat-label">筛选股票数</div>
          <div class="stat-val blue" id="stat-total">--</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">T最低高于T-1</div>
          <div class="stat-val green" id="stat-t-above">--</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">平均偏离(%)</div>
          <div class="stat-val" id="stat-avg-pct">--</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">回看天数</div>
          <div class="stat-val" id="stat-lookback">--</div>
        </div>
      </div>
    </div>
    <div class="table-header">
      <span class="table-title">筛选结果</span>
      <span class="table-count" id="table-count"></span>
      <div style="display:flex;align-items:center;gap:16px;margin-left:16px;flex-wrap:wrap">
        <label style="display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text2)">
          T最低vsT-1 ≥
          <input type="number" id="filter-t-low-pct" value="1" min="0" max="100" step="0.5"
                 style="width:56px;height:28px;border:1px solid var(--line-2);background:rgba(255,255,255,.03);color:var(--text1);border-radius:8px;padding:0 6px;font-size:13px;text-align:center;outline:none"
                 oninput="applyFilters()">
          <span style="color:var(--text3)">%</span>
        </label>
        <label style="display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text2)">
          当前vsT-1 ≤
          <input type="number" id="filter-price-pct" value="5" min="0" max="100" step="0.5"
                 style="width:56px;height:28px;border:1px solid var(--line-2);background:rgba(255,255,255,.03);color:var(--text1);border-radius:8px;padding:0 6px;font-size:13px;text-align:center;outline:none"
                 oninput="applyFilters()">
          <span style="color:var(--text3)">%</span>
        </label>
      </div>
      <div id="select-toolbar" style="display:none;margin-left:auto;align-items:center;gap:10px">
        <span style="font-size:13px;color:var(--text3)">已选 <b id="sel-count">0</b> 只</span>
        <button class="btn btn-ghost" onclick="clearSelection()" style="padding:5px 12px;font-size:12px">取消全选</button>
        <button class="btn btn-primary" onclick="addToWatchlist()" style="padding:5px 14px;font-size:12px">📌 加入自选</button>
      </div>
    </div>
    <div class="table-wrap" id="table-wrap">
      <div class="empty-state">
        <div class="icon">📋</div>
        <p>请选择左侧日期查看筛选结果</p>
      </div>
    </div>
    <div class="pagination" id="pagination" style="display:none">
      <span class="page-info" id="page-info"></span>
      <div class="page-btns" id="page-btns"></div>
    </div>
  </div>

    </div>
  </main>
</div>

<div id="kline-popup">
  <div class="kline-title" id="kline-title"></div>
  <img id="kline-img" src="" alt="日K线图" />
</div>
<div id="toast"></div>

<script>
const PAGE_SIZE = 10;
let sourceRows = [];
let allRows = [];
let currentPage = 1;
let selectedCodes = new Set();  // 跨分页保持选中状态
let availableDates = [];
let currentSelectedDate = '';
let monthLowLogES = null;

// ── 日期列表 ──
async function loadDates() {
  const dates = await fetch('/api/month_low/dates').then(r => r.json());
  availableDates = dates || [];
  const picker = document.getElementById('date-picker');
  const hint = document.getElementById('date-picker-hint');
  if (!dates.length) {
    picker.value = '';
    hint.textContent = '暂无历史数据，请先扫描';
    return;
  }
  picker.min = dates[dates.length - 1];
  picker.max = dates[0];
  picker.value = dates[0];
  hint.textContent = '可选日期范围：' + dates[dates.length - 1] + ' 至 ' + dates[0];
  selectDate(dates[0]);
}

function onDatePicked(value) {
  if (!value) return;
  if (!availableDates.includes(value)) {
    toast('该日期没有筛选结果');
    document.getElementById('date-picker').value = currentSelectedDate || (availableDates[0] || '');
    return;
  }
  selectDate(value);
}

async function selectDate(d) {
  currentSelectedDate = d;
  document.getElementById('date-picker').value = d;
  const rows = await fetch('/api/month_low/' + d).then(r => r.json());
  sourceRows = rows;
  currentPage = 1;
  selectedCodes.clear();
  updateSelToolbar();
  renderStats(rows);
  applyFilters();
}

// ── 分页渲染 ──
function renderPage() {
  const total = allRows.length;
  const totalPages = Math.max(1, Math.ceil(total / PAGE_SIZE));
  if (currentPage > totalPages) currentPage = totalPages;
  const start = (currentPage - 1) * PAGE_SIZE;
  const pageRows = allRows.slice(start, start + PAGE_SIZE);

  const wrap = document.getElementById('table-wrap');
  const cnt  = document.getElementById('table-count');
  cnt.textContent = total ? '共 ' + total + ' 只' : '';

  if (!total) {
    wrap.innerHTML = '<div class="empty-state"><div class="icon">🔍</div><p>该日期暂无筛选数据</p></div>';
    document.getElementById('pagination').style.display = 'none';
    return;
  }

  let html = '<table><thead><tr>' +
    '<th class="th-check"><input type="checkbox" id="check-all" onchange="toggleAll(this)"></th>' +
    '<th>#</th><th>代码</th><th>名称</th>' +
    '<th>当前价</th><th>T最低</th><th>T-1最低</th>' +
    '<th>当前vsT-1(%)</th><th>T最低vsT-1(%)</th><th>回看天数</th>' +
    '</tr></thead><tbody>';

  pageRows.forEach((r, i) => {
    const idx = start + i + 1;
    const p1 = Number(r.price_vs_t1_pct);
    const p2 = Number(r.t_low_vs_t1_pct);
    const checked = selectedCodes.has(r.code) ? 'checked' : '';
    html += '<tr>' +
      '<td class="td-check"><input type="checkbox" class="row-check" data-code="' + r.code + '" ' + checked + ' onchange="onRowCheck(this)"></td>' +
      '<td style="color:var(--text3)">' + idx + '</td>' +
      '<td><span class="code-cell" data-code="' + r.code + '" data-name="' + (r.name||'') + '">' + r.code + '</span></td>' +
      '<td>' + (r.name||'-') + '</td>' +
      '<td><strong>' + Number(r.current_price).toFixed(2) + '</strong></td>' +
      '<td>' + Number(r.t_low).toFixed(2) + '</td>' +
      '<td>' + Number(r.t_1_low).toFixed(2) + '</td>' +
      '<td><span class="' + pctClass(p1) + '">' + fmt(p1) + '</span></td>' +
      '<td><span class="' + pctClass(p2) + '">' + fmt(p2) + '</span></td>' +
      '<td style="color:var(--text3)">' + (r.lookback_days||'-') + '</td>' +
      '</tr>';
  });
  for (let i = pageRows.length; i < PAGE_SIZE; i++) {
    const idx = start + i + 1;
    html += '<tr class="empty-row">' +
      '<td class="td-check"></td>' +
      '<td style="color:var(--text3)">' + idx + '</td>' +
      '<td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td>' +
      '</tr>';
  }
  wrap.innerHTML = html + '</tbody></table>';

  // 分页控件
  const pg = document.getElementById('pagination');
  const info = document.getElementById('page-info');
  const btns = document.getElementById('page-btns');
  pg.style.display = 'flex';
  info.textContent = '第 ' + currentPage + ' / ' + totalPages + ' 页，共 ' + total + ' 条';

  btns.innerHTML = '';
  const addBtn = (label, page, disabled, active) => {
    const b = document.createElement('button');
    b.className = 'page-btn' + (active ? ' active' : '');
    b.textContent = label;
    b.disabled = disabled;
    b.onclick = () => { currentPage = page; renderPage(); };
    btns.appendChild(b);
  };

  addBtn('«', 1, currentPage === 1, false);
  addBtn('‹', currentPage - 1, currentPage === 1, false);

  // 页码窗口
  let lo = Math.max(1, currentPage - 2);
  let hi = Math.min(totalPages, lo + 4);
  lo = Math.max(1, hi - 4);
  for (let p = lo; p <= hi; p++) addBtn(p, p, false, p === currentPage);

  addBtn('›', currentPage + 1, currentPage === totalPages, false);
  addBtn('»', totalPages, currentPage === totalPages, false);
}

// ── 前端过滤 ──
function applyFilters() {
  const tLowMin  = parseFloat(document.getElementById('filter-t-low-pct').value)  || 0;
  const priceMax = parseFloat(document.getElementById('filter-price-pct').value) ?? 100;
  allRows = sourceRows.filter(r => {
    const p1 = Number(r.price_vs_t1_pct);
    const p2 = Number(r.t_low_vs_t1_pct);
    return p2 >= tLowMin && p1 <= priceMax;
  });
  currentPage = 1;
  renderPage();
}

function pctClass(v) { return v > 0 ? 'pct-pos' : v < 0 ? 'pct-neg' : 'pct-zero'; }
function fmt(v) { return (v >= 0 ? '+' : '') + v.toFixed(2) + '%'; }

function renderStats(rows) {
  const sec = document.getElementById('stat-section');
  if (!rows.length) { sec.style.display = 'none'; return; }
  sec.style.display = 'block';
  const total = rows.length;
  const avg = (rows.reduce((s,r) => s + Number(r.price_vs_t1_pct), 0) / total).toFixed(2);
  const above = rows.filter(r => Number(r.t_low_vs_t1_pct) > 0).length;
  const lb = rows[0].lookback_days || '-';
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-t-above').textContent = above + ' 只';
  const avgEl = document.getElementById('stat-avg-pct');
  avgEl.textContent = (avg >= 0 ? '+' : '') + avg + '%';
  avgEl.className = 'stat-val ' + (avg > 0 ? 'red' : avg < 0 ? 'green' : '');
  document.getElementById('stat-lookback').textContent = lb + ' 日';
}

// ── 扫描 ──
function attachMonthLowLogStream({ reset = false } = {}) {
  const btn = document.getElementById('btn-run');
  const logSec = document.getElementById('log-section');
  const panel  = document.getElementById('log-panel');
  logSec.style.display = 'flex';
  if (reset) panel.innerHTML = '';

  if (monthLowLogES) monthLowLogES.close();
  monthLowLogES = new EventSource('/api/month_low/log');

  monthLowLogES.onmessage = (e) => {
    const line = e.data;
    if (line === '__START__' || line === '__HEARTBEAT__') return;
    if (line.startsWith('__DONE__')) {
      const code = line.split(':')[1];
      const el = document.createElement('div');
      el.className = code === '0' ? 'log-done' : 'log-err';
      el.textContent = code === '0' ? '✅ 扫描完成' : '❌ 扫描异常退出';
      panel.appendChild(el);
      panel.scrollTop = panel.scrollHeight;
      monthLowLogES.close();
      monthLowLogES = null;
      btn.disabled = false;
      btn.textContent = '▶ 立即扫描';
      loadDates();
      return;
    }
    const el = document.createElement('div');
    el.textContent = line;
    panel.appendChild(el);
    panel.scrollTop = panel.scrollHeight;
  };

  monthLowLogES.onerror = () => {
    if (monthLowLogES) monthLowLogES.close();
    monthLowLogES = null;
    btn.disabled = false;
    btn.textContent = '▶ 立即扫描';
  };
}

async function runScan() {
  const lookback = parseInt(document.getElementById('input-lookback').value) || 10;
  if (lookback < 1 || lookback > 250) { toast('回看天数请填 1~250'); return; }
  const btn = document.getElementById('btn-run');
  btn.disabled = true; btn.textContent = '⏳ 扫描中...';
  const logSec = document.getElementById('log-section');
  const panel  = document.getElementById('log-panel');
  logSec.style.display = 'flex'; panel.innerHTML = '';

  const data = await fetch('/api/month_low/run', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({lookback_days: lookback})
  }).then(r => r.json());

  if (!data.ok) {
    if (data.msg && data.msg.includes('扫描正在进行中')) {
      const el = document.createElement('div');
      el.className = 'log-done';
      el.textContent = '已接入当前正在执行的扫描日志...';
      panel.appendChild(el);
      attachMonthLowLogStream({ reset: false });
      return;
    }
    panel.innerHTML = '<span class="log-err">' + data.msg + '</span>';
    btn.disabled = false; btn.textContent = '▶ 立即扫描'; return;
  }

  attachMonthLowLogStream({ reset: false });
}

// ── K线浮层（事件委托，避免内联引号问题）──
document.addEventListener('mouseover', (e) => {
  const el = e.target.closest('.code-cell');
  if (!el) return;
  showKline(e, el.dataset.code, el.dataset.name);
});
document.addEventListener('mouseout', (e) => {
  if (e.target.closest('.code-cell')) hideKline();
});

function klineUrl(code) {
  const market = code.startsWith('6') ? '1' : '0';
  return 'http://webquotepic.eastmoney.com/GetPic.aspx?nid=' + market + '.' + code + '&imageType=k&token=44c9d251add88e27b65ed86506f6758a';
}
let _klineTimer = null;
function showKline(e, code, name) {
  clearTimeout(_klineTimer);
  const popup = document.getElementById('kline-popup');
  document.getElementById('kline-title').textContent = code + (name ? '  ' + name : '') + '  日K线';
  document.getElementById('kline-img').src = klineUrl(code);
  popup.style.display = 'block';
  const margin = 12, pw = 400, ph = 230;
  let x = e.clientX + margin, y = e.clientY + margin;
  if (x + pw > window.innerWidth)  x = e.clientX - pw - margin;
  if (y + ph > window.innerHeight) y = e.clientY - ph - margin;
  popup.style.left = x + 'px'; popup.style.top = y + 'px';
}
function hideKline() {
  _klineTimer = setTimeout(() => { document.getElementById('kline-popup').style.display = 'none'; }, 150);
}

// ── 复选框 ──
function onRowCheck(cb) {
  if (cb.checked) selectedCodes.add(cb.dataset.code);
  else selectedCodes.delete(cb.dataset.code);
  updateSelToolbar();
  // 同步全选框状态
  const all = document.querySelectorAll('.row-check');
  const checked = document.querySelectorAll('.row-check:checked');
  const ca = document.getElementById('check-all');
  if (ca) ca.indeterminate = checked.length > 0 && checked.length < all.length;
  if (ca) ca.checked = all.length > 0 && checked.length === all.length;
}

function toggleAll(cb) {
  document.querySelectorAll('.row-check').forEach(c => {
    c.checked = cb.checked;
    if (cb.checked) selectedCodes.add(c.dataset.code);
    else selectedCodes.delete(c.dataset.code);
  });
  updateSelToolbar();
}

function clearSelection() {
  selectedCodes.clear();
  document.querySelectorAll('.row-check').forEach(c => c.checked = false);
  const ca = document.getElementById('check-all');
  if (ca) { ca.checked = false; ca.indeterminate = false; }
  updateSelToolbar();
}

function updateSelToolbar() {
  const n = selectedCodes.size;
  document.getElementById('sel-count').textContent = n;
  document.getElementById('select-toolbar').style.display = n > 0 ? 'flex' : 'none';
}

async function addToWatchlist() {
  if (!selectedCodes.size) return;
  // 找到选中股票的完整数据
  const codeSet = selectedCodes;
  const rows = sourceRows.filter(r => codeSet.has(r.code)).map(r => ({
    code:            r.code,
    name:            r.name || '',
    current_price:   r.current_price,
    t_low:           r.t_low,
    t_1_low:         r.t_1_low,
    price_vs_t1_pct: r.price_vs_t1_pct,
    t_low_vs_t1_pct: r.t_low_vs_t1_pct,
    lookback_days:   r.lookback_days,
    scan_date:       currentSelectedDate || '',
  }));
  const today = new Date().toISOString().slice(0, 10);
  const res = await fetch('/api/watchlist/add', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({rows, add_date: today})
  }).then(r => r.json());
  if (res.ok) {
    toast('已加入自选 ' + res.count + ' 只');
    clearSelection();
  } else {
    toast(res.msg || '加入失败');
  }
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2000);
}

async function resumeRunningMonthLowScan() {
  const status = await fetch('/api/month_low/status').then(r => r.json()).catch(() => ({running:false}));
  if (!status.running) return;
  const btn = document.getElementById('btn-run');
  const panel = document.getElementById('log-panel');
  const logSec = document.getElementById('log-section');
  btn.disabled = true;
  btn.textContent = '⏳ 扫描中...';
  logSec.style.display = 'flex';
  panel.innerHTML = '<div>已恢复当前扫描日志...</div>';
  attachMonthLowLogStream({ reset: false });
}

loadDates();
resumeRunningMonthLowScan();
</script>
