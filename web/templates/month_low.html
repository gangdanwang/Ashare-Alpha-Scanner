<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MonthLow · 近N日低点选股</title>
  <style>
    :root {
      --blue:#1664FF; --blue-lt:#E8F0FF; --green:#00B42A; --red:#F53F3F;
      --text1:#1D2129; --text2:#4E5969; --text3:#86909C;
      --border:#E5E6EB; --bg:#F2F3F5; --white:#FFFFFF; --radius:8px;
    }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:"PingFang SC","Helvetica Neue",Arial,sans-serif;
           background:var(--bg); color:var(--text1);
           height:100vh; display:flex; flex-direction:column; overflow:hidden; }

    /* 顶栏 */
    .topbar { background:var(--white); border-bottom:1px solid var(--border);
              padding:0 24px; height:52px; display:flex; align-items:center;
              gap:16px; flex-shrink:0; box-shadow:0 1px 4px rgba(0,0,0,.06); }
    .topbar-logo { font-size:15px; font-weight:700; color:var(--blue); display:flex; align-items:center; gap:6px; }
    .topbar-sub  { font-size:13px; color:var(--text3); border-left:1px solid var(--border); padding-left:16px; }
    .topbar-back { margin-left:auto; font-size:13px; color:var(--blue); text-decoration:none; }
    .topbar-back:hover { opacity:.8; }

    /* 主体：左1/3 + 右2/3 */
    .layout { display:flex; flex:1; overflow:hidden; }

    /* 左侧面板 */
    .left-panel { width:33.333%; border-right:1px solid var(--border);
                  background:var(--white); display:flex; flex-direction:column;
                  overflow-y:auto; flex-shrink:0; }
    .panel-section { padding:16px; border-bottom:1px solid var(--border); }
    .panel-section:last-child { border-bottom:none; }
    .section-title { font-size:13px; font-weight:600; color:var(--text2);
                     margin-bottom:12px; display:flex; align-items:center; gap:6px; }

    /* 筛选条件 */
    .filter-row { display:flex; align-items:center; gap:8px; margin-bottom:10px; }
    .filter-label { font-size:13px; color:var(--text2); white-space:nowrap; }
    .filter-input { width:64px; height:32px; border:1px solid var(--border);
                    border-radius:var(--radius); padding:0 8px; font-size:14px;
                    color:var(--text1); outline:none; text-align:center; }
    .filter-input:focus { border-color:var(--blue); box-shadow:0 0 0 2px var(--blue-lt); }
    .filter-unit { font-size:13px; color:var(--text3); }

    /* 日期选择 */
    .date-list { display:flex; flex-direction:column; gap:4px; }
    .date-item { padding:8px 12px; border-radius:var(--radius); cursor:pointer;
                 font-size:13px; color:var(--text2); transition:all .15s;
                 border:1px solid transparent; }
    .date-item:hover { background:var(--bg); color:var(--blue); }
    .date-item.active { background:var(--blue-lt); color:var(--blue);
                        border-color:var(--blue); font-weight:600; }

    /* 统计 */
    .stat-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
    .stat-card { background:var(--bg); border-radius:var(--radius); padding:10px 12px; }
    .stat-label { font-size:11px; color:var(--text3); margin-bottom:4px; }
    .stat-val { font-size:18px; font-weight:700; color:var(--text1); }
    .stat-val.blue  { color:var(--blue); }
    .stat-val.green { color:var(--green); }
    .stat-val.red   { color:var(--red); }

    /* 日志 */
    .log-box { background:#1D2129; border-radius:var(--radius); padding:12px;
               font-family:"SF Mono","Fira Code",monospace; font-size:11px;
               color:#C9CDD4; max-height:220px; overflow-y:auto;
               white-space:pre-wrap; word-break:break-all; }
    .log-done { color:#00B42A; } .log-err { color:#F53F3F; }

    /* 按钮 */
    .btn { display:inline-flex; align-items:center; gap:6px; padding:7px 16px;
           border-radius:var(--radius); border:none; cursor:pointer; font-size:13px;
           font-weight:500; transition:all .15s; }
    .btn:disabled { opacity:.5; cursor:not-allowed; }
    .btn-primary { background:var(--blue); color:var(--white); width:100%; justify-content:center; }
    .btn-primary:hover:not(:disabled) { background:#0052D9; }
    .btn-ghost { background:var(--white); color:var(--blue); border:1px solid var(--blue); }
    .btn-ghost:hover:not(:disabled) { background:var(--blue-lt); }

    /* 右侧内容 */
    .right-panel { flex:1; display:flex; flex-direction:column; overflow:hidden; }

    /* 表格区 */
    .table-wrap { flex:1; overflow-y:auto; }
    .table-header { padding:14px 20px; border-bottom:1px solid var(--border);
                    display:flex; align-items:center; justify-content:space-between;
                    background:var(--white); flex-shrink:0; }
    .table-title { font-size:15px; font-weight:600; color:var(--text1); }
    .table-count { font-size:13px; color:var(--text3); }

    table { width:100%; border-collapse:collapse; font-size:13px; }
    thead th { background:#F7F8FA; color:var(--text2); font-weight:500;
               padding:10px 14px; text-align:left; border-bottom:1px solid var(--border);
               white-space:nowrap; position:sticky; top:0; z-index:1; }
    tbody tr { border-bottom:1px solid var(--border); transition:background .1s; }
    tbody tr:last-child { border-bottom:none; }
    tbody tr:hover { background:#F7F8FA; }
    tbody td { padding:10px 14px; white-space:nowrap; }

    .code-cell { font-family:"SF Mono",monospace; font-weight:600; color:var(--blue);
                 font-size:13px; cursor:pointer; text-decoration:underline dotted; }
    input[type=checkbox] { width:15px; height:15px; cursor:pointer; accent-color:var(--blue); }
    .th-check, .td-check { width:36px; text-align:center; }
    .pct-pos { color:var(--red); font-weight:600; }
    .pct-neg { color:var(--green); font-weight:600; }
    .pct-zero { color:var(--text3); }

    /* 分页 */
    .pagination { padding:12px 20px; border-top:1px solid var(--border);
                  display:flex; align-items:center; justify-content:space-between;
                  background:var(--white); flex-shrink:0; }
    .page-info { font-size:13px; color:var(--text3); }
    .page-btns { display:flex; gap:4px; }
    .page-btn { width:32px; height:32px; border-radius:var(--radius);
                border:1px solid var(--border); background:var(--white);
                color:var(--text2); cursor:pointer; font-size:13px;
                display:flex; align-items:center; justify-content:center;
                transition:all .15s; }
    .page-btn:hover { border-color:var(--blue); color:var(--blue); }
    .page-btn.active { background:var(--blue); border-color:var(--blue);
                       color:var(--white); font-weight:600; }
    .page-btn:disabled { opacity:.4; cursor:not-allowed; }

    .empty-state { padding:64px 0; text-align:center; color:var(--text3); }
    .empty-state .icon { font-size:36px; margin-bottom:10px; }
    .empty-state p { font-size:14px; }

    /* K线浮层 */
    #kline-popup { position:fixed; z-index:500; background:var(--white);
                   border:1px solid var(--border); border-radius:var(--radius);
                   box-shadow:0 8px 24px rgba(0,0,0,.12); padding:10px;
                   display:none; pointer-events:none; }
    #kline-popup .kline-title { font-size:12px; color:var(--text2);
                                margin-bottom:6px; font-weight:500; }
    #kline-popup img { display:block; width:380px; height:auto; border-radius:4px; }

    /* Toast */
    #toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
             background:rgba(29,33,41,.9); color:#fff; padding:8px 18px;
             border-radius:20px; font-size:13px; opacity:0; transition:opacity .3s;
             pointer-events:none; z-index:999; white-space:nowrap; }
    #toast.show { opacity:1; }
  </style>
</head>
<body>

<div class="topbar">
  <div class="topbar-logo"><span>📉</span> MonthLow</div>
  <div class="topbar-sub">近N日低点反弹选股</div>
  <nav style="margin-left:auto;display:flex;gap:4px">
    <a href="/month_low" style="padding:6px 14px;border-radius:6px;font-size:13px;font-weight:600;background:var(--blue);color:#fff;text-decoration:none">📉 筛选</a>
    <a href="/watchlist" style="padding:6px 14px;border-radius:6px;font-size:13px;font-weight:500;color:var(--blue);text-decoration:none;border:1px solid var(--border)">📌 自选</a>
    <a href="/position" style="padding:6px 14px;border-radius:6px;font-size:13px;font-weight:500;color:var(--blue);text-decoration:none;border:1px solid var(--border)">💼 持仓</a>
  </nav>
</div>

<div class="layout">

  <!-- 左侧面板 -->
  <div class="left-panel">

    <!-- 筛选条件 -->
    <div class="panel-section">
      <div class="section-title">⚙️ 筛选条件</div>
      <div class="filter-row">
        <span class="filter-label">近</span>
        <input class="filter-input" type="number" id="input-lookback" value="20" min="1" max="250" />
        <span class="filter-unit">个交易日新低</span>
      </div>
      <button class="btn btn-primary" id="btn-run" onclick="runScan()" style="margin-top:4px">▶ 立即扫描</button>
    </div>

    <!-- 日期选择 -->
    <div class="panel-section">
      <div class="section-title" style="justify-content:space-between">
        📅 历史日期
        <span style="font-size:12px;font-weight:400;color:var(--text3);cursor:pointer" onclick="loadDates()">↻ 刷新</span>
      </div>
      <div class="date-list" id="date-list">
        <div style="color:var(--text3);font-size:13px">加载中...</div>
      </div>
    </div>

    <!-- 统计 -->
    <div class="panel-section" id="stat-section" style="display:none">
      <div class="section-title">📊 本次统计</div>
      <div class="stat-grid">
        <div class="stat-card">
          <div class="stat-label">筛选股票数</div>
          <div class="stat-val blue" id="stat-total">--</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">T最低高于T-1</div>
          <div class="stat-val green" id="stat-t-above">--</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">平均偏离(%)</div>
          <div class="stat-val" id="stat-avg-pct">--</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">回看天数</div>
          <div class="stat-val" id="stat-lookback">--</div>
        </div>
      </div>
    </div>

    <!-- 扫描日志 -->
    <div class="panel-section" id="log-section" style="display:none">
      <div class="section-title">📋 扫描日志</div>
      <div class="log-box" id="log-panel"></div>
    </div>

  </div>

  <!-- 右侧结果 -->
  <div class="right-panel">
    <div class="table-header">
      <span class="table-title">筛选结果</span>
      <span class="table-count" id="table-count"></span>
      <div style="display:flex;align-items:center;gap:16px;margin-left:16px;flex-wrap:wrap">
        <label style="display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text2)">
          T最低vsT-1 ≥
          <input type="number" id="filter-t-low-pct" value="1" min="0" max="100" step="0.5"
                 style="width:56px;height:28px;border:1px solid var(--border);border-radius:6px;padding:0 6px;font-size:13px;text-align:center;outline:none"
                 oninput="applyFilters()">
          <span style="color:var(--text3)">%</span>
        </label>
        <label style="display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text2)">
          当前vsT-1 ≤
          <input type="number" id="filter-price-pct" value="5" min="0" max="100" step="0.5"
                 style="width:56px;height:28px;border:1px solid var(--border);border-radius:6px;padding:0 6px;font-size:13px;text-align:center;outline:none"
                 oninput="applyFilters()">
          <span style="color:var(--text3)">%</span>
        </label>
      </div>
      <div id="select-toolbar" style="display:none;margin-left:auto;display:flex;align-items:center;gap:10px">
        <span style="font-size:13px;color:var(--text3)">已选 <b id="sel-count">0</b> 只</span>
        <button class="btn btn-ghost" onclick="clearSelection()" style="padding:5px 12px;font-size:12px">取消全选</button>
        <button class="btn btn-primary" onclick="addToWatchlist()" style="padding:5px 14px;font-size:12px">📌 加入自选</button>
      </div>
    </div>
    <div class="table-wrap" id="table-wrap">
      <div class="empty-state">
        <div class="icon">📋</div>
        <p>请选择左侧日期查看筛选结果</p>
      </div>
    </div>
    <div class="pagination" id="pagination" style="display:none">
      <span class="page-info" id="page-info"></span>
      <div class="page-btns" id="page-btns"></div>
    </div>
  </div>

</div>

<div id="kline-popup">
  <div class="kline-title" id="kline-title"></div>
  <img id="kline-img" src="" alt="日K线图" />
</div>
<div id="toast"></div>

<script>
const PAGE_SIZE = 20;
let allRows = [];
let currentPage = 1;
let selectedCodes = new Set();  // 跨分页保持选中状态

// ── 日期列表 ──
async function loadDates() {
  const dates = await fetch('/api/month_low/dates').then(r => r.json());
  const list = document.getElementById('date-list');
  list.innerHTML = '';
  if (!dates.length) {
    list.innerHTML = '<div style="color:var(--text3);font-size:13px">暂无数据，请先扫描</div>';
    return;
  }
  dates.forEach((d, i) => {
    const el = document.createElement('div');
    el.className = 'date-item' + (i === 0 ? ' active' : '');
    el.textContent = d;
    el.onclick = () => selectDate(d, el);
    list.appendChild(el);
  });
  selectDate(dates[0], list.querySelector('.date-item'));
}

async function selectDate(d, el) {
  document.querySelectorAll('.date-item').forEach(e => e.classList.remove('active'));
  el.classList.add('active');
  const rows = await fetch('/api/month_low/' + d).then(r => r.json());
  allRows = rows;
  currentPage = 1;
  selectedCodes.clear();
  updateSelToolbar();
  renderStats(rows);
  applyFilters();
}

// ── 分页渲染 ──
function renderPage() {
  const total = allRows.length;
  const totalPages = Math.max(1, Math.ceil(total / PAGE_SIZE));
  if (currentPage > totalPages) currentPage = totalPages;
  const start = (currentPage - 1) * PAGE_SIZE;
  const pageRows = allRows.slice(start, start + PAGE_SIZE);

  const wrap = document.getElementById('table-wrap');
  const cnt  = document.getElementById('table-count');
  cnt.textContent = total ? '共 ' + total + ' 只' : '';

  if (!total) {
    wrap.innerHTML = '<div class="empty-state"><div class="icon">🔍</div><p>该日期暂无筛选数据</p></div>';
    document.getElementById('pagination').style.display = 'none';
    return;
  }

  let html = '<table><thead><tr>' +
    '<th class="th-check"><input type="checkbox" id="check-all" onchange="toggleAll(this)"></th>' +
    '<th>#</th><th>代码</th><th>名称</th>' +
    '<th>当前价</th><th>T最低</th><th>T-1最低</th>' +
    '<th>当前vsT-1(%)</th><th>T最低vsT-1(%)</th><th>回看天数</th>' +
    '</tr></thead><tbody>';

  pageRows.forEach((r, i) => {
    const idx = start + i + 1;
    const p1 = Number(r.price_vs_t1_pct);
    const p2 = Number(r.t_low_vs_t1_pct);
    const checked = selectedCodes.has(r.code) ? 'checked' : '';
    html += '<tr>' +
      '<td class="td-check"><input type="checkbox" class="row-check" data-code="' + r.code + '" ' + checked + ' onchange="onRowCheck(this)"></td>' +
      '<td style="color:var(--text3)">' + idx + '</td>' +
      '<td><span class="code-cell" data-code="' + r.code + '" data-name="' + (r.name||'') + '">' + r.code + '</span></td>' +
      '<td>' + (r.name||'-') + '</td>' +
      '<td><strong>' + Number(r.current_price).toFixed(2) + '</strong></td>' +
      '<td>' + Number(r.t_low).toFixed(2) + '</td>' +
      '<td>' + Number(r.t_1_low).toFixed(2) + '</td>' +
      '<td><span class="' + pctClass(p1) + '">' + fmt(p1) + '</span></td>' +
      '<td><span class="' + pctClass(p2) + '">' + fmt(p2) + '</span></td>' +
      '<td style="color:var(--text3)">' + (r.lookback_days||'-') + '</td>' +
      '</tr>';
  });
  wrap.innerHTML = html + '</tbody></table>';

  // 分页控件
  const pg = document.getElementById('pagination');
  const info = document.getElementById('page-info');
  const btns = document.getElementById('page-btns');
  pg.style.display = 'flex';
  info.textContent = '第 ' + currentPage + ' / ' + totalPages + ' 页，共 ' + total + ' 条';

  btns.innerHTML = '';
  const addBtn = (label, page, disabled, active) => {
    const b = document.createElement('button');
    b.className = 'page-btn' + (active ? ' active' : '');
    b.textContent = label;
    b.disabled = disabled;
    b.onclick = () => { currentPage = page; renderPage(); };
    btns.appendChild(b);
  };

  addBtn('«', 1, currentPage === 1, false);
  addBtn('‹', currentPage - 1, currentPage === 1, false);

  // 页码窗口
  let lo = Math.max(1, currentPage - 2);
  let hi = Math.min(totalPages, lo + 4);
  lo = Math.max(1, hi - 4);
  for (let p = lo; p <= hi; p++) addBtn(p, p, false, p === currentPage);

  addBtn('›', currentPage + 1, currentPage === totalPages, false);
  addBtn('»', totalPages, currentPage === totalPages, false);
}

// ── 前端过滤 ──
function applyFilters() {
  const tLowMin  = parseFloat(document.getElementById('filter-t-low-pct').value)  || 0;
  const priceMax = parseFloat(document.getElementById('filter-price-pct').value) ?? 100;
  const filtered = allRows.filter(r => {
    const p1 = Number(r.price_vs_t1_pct);
    const p2 = Number(r.t_low_vs_t1_pct);
    return p2 >= tLowMin && p1 <= priceMax;
  });
  // 临时替换渲染数据（不修改 allRows）
  const saved = allRows;
  allRows = filtered;
  currentPage = 1;
  renderPage();
  allRows = saved;
}

function pctClass(v) { return v > 0 ? 'pct-pos' : v < 0 ? 'pct-neg' : 'pct-zero'; }
function fmt(v) { return (v >= 0 ? '+' : '') + v.toFixed(2) + '%'; }

function renderStats(rows) {
  const sec = document.getElementById('stat-section');
  if (!rows.length) { sec.style.display = 'none'; return; }
  sec.style.display = 'block';
  const total = rows.length;
  const avg = (rows.reduce((s,r) => s + Number(r.price_vs_t1_pct), 0) / total).toFixed(2);
  const above = rows.filter(r => Number(r.t_low_vs_t1_pct) > 0).length;
  const lb = rows[0].lookback_days || '-';
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-t-above').textContent = above + ' 只';
  const avgEl = document.getElementById('stat-avg-pct');
  avgEl.textContent = (avg >= 0 ? '+' : '') + avg + '%';
  avgEl.className = 'stat-val ' + (avg > 0 ? 'red' : avg < 0 ? 'green' : '');
  document.getElementById('stat-lookback').textContent = lb + ' 日';
}

// ── 扫描 ──
async function runScan() {
  const lookback = parseInt(document.getElementById('input-lookback').value) || 10;
  if (lookback < 1 || lookback > 250) { toast('回看天数请填 1~250'); return; }
  const btn = document.getElementById('btn-run');
  btn.disabled = true; btn.textContent = '⏳ 扫描中...';
  const logSec = document.getElementById('log-section');
  const panel  = document.getElementById('log-panel');
  logSec.style.display = 'block'; panel.innerHTML = '';

  const data = await fetch('/api/month_low/run', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({lookback_days: lookback})
  }).then(r => r.json());

  if (!data.ok) {
    panel.innerHTML = '<span class="log-err">' + data.msg + '</span>';
    btn.disabled = false; btn.textContent = '▶ 立即扫描'; return;
  }

  const es = new EventSource('/api/month_low/log');
  es.onmessage = (e) => {
    const line = e.data;
    if (line === '__START__' || line === '__HEARTBEAT__') return;
    if (line.startsWith('__DONE__')) {
      const code = line.split(':')[1];
      const el = document.createElement('div');
      el.className = code === '0' ? 'log-done' : 'log-err';
      el.textContent = code === '0' ? '✅ 扫描完成' : '❌ 扫描异常退出';
      panel.appendChild(el); panel.scrollTop = panel.scrollHeight;
      es.close(); btn.disabled = false; btn.textContent = '▶ 立即扫描';
      loadDates(); return;
    }
    const el = document.createElement('div');
    el.textContent = line; panel.appendChild(el); panel.scrollTop = panel.scrollHeight;
  };
  es.onerror = () => { es.close(); btn.disabled = false; btn.textContent = '▶ 立即扫描'; };
}

// ── K线浮层（事件委托，避免内联引号问题）──
document.addEventListener('mouseover', (e) => {
  const el = e.target.closest('.code-cell');
  if (!el) return;
  showKline(e, el.dataset.code, el.dataset.name);
});
document.addEventListener('mouseout', (e) => {
  if (e.target.closest('.code-cell')) hideKline();
});

function klineUrl(code) {
  const market = code.startsWith('6') ? '1' : '0';
  return 'http://webquotepic.eastmoney.com/GetPic.aspx?nid=' + market + '.' + code + '&imageType=k&token=44c9d251add88e27b65ed86506f6758a';
}
let _klineTimer = null;
function showKline(e, code, name) {
  clearTimeout(_klineTimer);
  const popup = document.getElementById('kline-popup');
  document.getElementById('kline-title').textContent = code + (name ? '  ' + name : '') + '  日K线';
  document.getElementById('kline-img').src = klineUrl(code);
  popup.style.display = 'block';
  const margin = 12, pw = 400, ph = 230;
  let x = e.clientX + margin, y = e.clientY + margin;
  if (x + pw > window.innerWidth)  x = e.clientX - pw - margin;
  if (y + ph > window.innerHeight) y = e.clientY - ph - margin;
  popup.style.left = x + 'px'; popup.style.top = y + 'px';
}
function hideKline() {
  _klineTimer = setTimeout(() => { document.getElementById('kline-popup').style.display = 'none'; }, 150);
}

// ── 复选框 ──
function onRowCheck(cb) {
  if (cb.checked) selectedCodes.add(cb.dataset.code);
  else selectedCodes.delete(cb.dataset.code);
  updateSelToolbar();
  // 同步全选框状态
  const all = document.querySelectorAll('.row-check');
  const checked = document.querySelectorAll('.row-check:checked');
  const ca = document.getElementById('check-all');
  if (ca) ca.indeterminate = checked.length > 0 && checked.length < all.length;
  if (ca) ca.checked = all.length > 0 && checked.length === all.length;
}

function toggleAll(cb) {
  document.querySelectorAll('.row-check').forEach(c => {
    c.checked = cb.checked;
    if (cb.checked) selectedCodes.add(c.dataset.code);
    else selectedCodes.delete(c.dataset.code);
  });
  updateSelToolbar();
}

function clearSelection() {
  selectedCodes.clear();
  document.querySelectorAll('.row-check').forEach(c => c.checked = false);
  const ca = document.getElementById('check-all');
  if (ca) { ca.checked = false; ca.indeterminate = false; }
  updateSelToolbar();
}

function updateSelToolbar() {
  const n = selectedCodes.size;
  document.getElementById('sel-count').textContent = n;
  document.getElementById('select-toolbar').style.display = n > 0 ? 'flex' : 'none';
}

async function addToWatchlist() {
  if (!selectedCodes.size) return;
  // 找到选中股票的完整数据
  const codeSet = selectedCodes;
  const rows = allRows.filter(r => codeSet.has(r.code)).map(r => ({
    code:            r.code,
    name:            r.name || '',
    current_price:   r.current_price,
    t_low:           r.t_low,
    t_1_low:         r.t_1_low,
    price_vs_t1_pct: r.price_vs_t1_pct,
    t_low_vs_t1_pct: r.t_low_vs_t1_pct,
    lookback_days:   r.lookback_days,
    scan_date:       document.querySelector('.date-item.active')?.textContent || '',
  }));
  const today = new Date().toISOString().slice(0, 10);
  const res = await fetch('/api/watchlist/add', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({rows, add_date: today})
  }).then(r => r.json());
  if (res.ok) {
    toast('已加入自选 ' + res.count + ' 只');
    clearSelection();
  } else {
    toast(res.msg || '加入失败');
  }
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2000);
}

loadDates();
</script>
