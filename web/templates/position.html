<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>持仓记录</title>
  <style>
    :root {
      --bg:#050505;
      --bg-2:#0d0d0f;
      --panel:#141416;
      --panel-strong:#19191c;
      --panel-soft:#101012;
      --line:#232327;
      --line-2:#2d2d33;
      --text1:#f5f5f7;
      --text2:#b8b8c2;
      --text3:#73737c;
      --blue:#8a72ff;
      --blue-strong:#775cff;
      --blue-lt:rgba(123,97,255,.16);
      --green:#21e6a6;
      --red:#ff5f7a;
      --amber:#ffc96b;
      --white:#ffffff;
      --shadow:0 18px 40px rgba(0,0,0,.28);
      --radius:18px;
    }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:"PingFang SC","Helvetica Neue",Arial,sans-serif;
           background:
             radial-gradient(circle at top center, rgba(123,97,255,.08), transparent 18%),
             linear-gradient(180deg, #090909 0%, #040404 100%);
           color:var(--text1); min-height:100vh; overflow:hidden; }

    .app-shell { display:flex; min-height:100vh; }
    .sidebar {
      width:220px; flex-shrink:0; padding:24px 14px;
      background:linear-gradient(180deg, #101012, #09090a);
      border-right:1px solid var(--line);
      box-shadow:inset -1px 0 0 rgba(255,255,255,.03);
      display:flex; flex-direction:column;
    }
    .menu-card {
      flex:1;
      background:#121214; border:1px solid var(--line);
      border-radius:20px; padding:18px; box-shadow:var(--shadow);
      display:flex; flex-direction:column;
    }
    .menu-title {
      font-size:11px; text-transform:uppercase; letter-spacing:.16em; color:var(--text3);
      margin-bottom:14px;
    }
    .tree { position:relative; padding-left:12px; }
    .tree::before {
      content:""; position:absolute; left:5px; top:8px; bottom:8px; width:1px;
      background:linear-gradient(180deg, rgba(138,114,255,.45), rgba(138,114,255,0));
    }
    .tree-link {
      position:relative; display:flex; align-items:center; gap:10px; margin-bottom:10px;
      padding:12px 14px 12px 18px; border-radius:14px; color:var(--text2); text-decoration:none;
      border:1px solid transparent; transition:all .18s ease;
      background:rgba(255,255,255,.015);
    }
    .tree-link::before {
      content:""; position:absolute; left:-11px; top:50%; width:14px; height:1px;
      background:rgba(138,114,255,.45);
    }
    .tree-link:hover {
      color:var(--text1); border-color:rgba(138,114,255,.2); background:rgba(255,255,255,.035);
      transform:translateX(2px);
    }
    .tree-link.active {
      color:var(--text1);
      background:linear-gradient(135deg, rgba(123,97,255,.18), rgba(123,97,255,.08));
      border-color:rgba(138,114,255,.34);
      box-shadow:0 0 0 1px rgba(138,114,255,.08) inset, 0 12px 24px rgba(0,0,0,.28);
    }
    .tree-link span:last-child { font-weight:600; }

    .workspace {
      flex:1; min-width:0; padding:24px; display:flex; flex-direction:column; overflow:hidden;
    }

    .layout { display:flex; flex:1; gap:18px; min-height:0; overflow:hidden; }

    /* 左侧面板 */
    .left-panel { width:320px; display:flex; flex-direction:column;
                  overflow-y:auto; flex-shrink:0; gap:16px; padding-right:4px; }
    .panel-section {
      padding:18px; border:1px solid rgba(86,111,160,.2);
      background:linear-gradient(180deg, #141416, #101012);
      border-radius:22px; box-shadow:var(--shadow);
    }
    .section-title { font-size:13px; font-weight:600; color:var(--text2);
                     margin-bottom:12px; display:flex; align-items:center; gap:6px; }

    /* 筛选条件 */
    .filter-row { display:flex; align-items:center; gap:8px; margin-bottom:10px; }
    .filter-label { font-size:13px; color:var(--text2); white-space:nowrap; }
    .filter-input { width:72px; height:36px; border:1px solid var(--line-2);
                    border-radius:12px; padding:0 8px; font-size:14px;
                    background:rgba(255,255,255,.03); color:var(--text1); outline:none; text-align:center; }
    .filter-input:focus { border-color:var(--blue-strong); box-shadow:0 0 0 3px rgba(47,140,255,.12); }
    .filter-unit { font-size:13px; color:var(--text3); }

    /* 日期选择 */
    .date-list { display:flex; flex-direction:column; gap:4px; }
    .date-item { padding:10px 12px; border-radius:14px; cursor:pointer;
                 font-size:13px; color:var(--text2); transition:all .15s;
                 border:1px solid transparent; }
    .date-item:hover { background:rgba(255,255,255,.03); color:var(--text1); border-color:rgba(138,114,255,.16); }
    .date-item.active { background:rgba(123,97,255,.14); color:var(--text1);
                        border-color:rgba(138,114,255,.28); font-weight:600; }

    /* 统计 */
    .stat-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
    .stat-card { background:rgba(255,255,255,.03); border-radius:16px; padding:12px; border:1px solid rgba(88,112,160,.14); }
    .stat-label { font-size:11px; color:var(--text3); margin-bottom:4px; }
    .stat-val { font-size:18px; font-weight:700; color:var(--text1); }
    .stat-val.blue  { color:var(--blue); }
    .stat-val.green { color:var(--green); }
    .stat-val.red   { color:var(--red); }

    /* 日志 */
    .log-box { background:rgba(4,10,18,.9); border:1px solid rgba(80,105,150,.16); border-radius:16px; padding:12px;
               font-family:"SF Mono","Fira Code",monospace; font-size:11px;
               color:#C9CDD4; max-height:220px; overflow-y:auto;
               white-space:pre-wrap; word-break:break-all; }
    .log-done { color:#00B42A; } .log-err { color:#F53F3F; }

    /* 按钮 */
    .btn { display:inline-flex; align-items:center; gap:6px; padding:7px 16px;
           border-radius:14px; border:none; cursor:pointer; font-size:13px;
           font-weight:500; transition:all .15s; }
    .btn:disabled { opacity:.5; cursor:not-allowed; }
    .btn-primary {
      background:linear-gradient(135deg, #6f57ff, #8a72ff);
      color:#f8f7ff; justify-content:center; font-weight:700;
      box-shadow:0 10px 28px rgba(111,87,255,.24);
    }
    .btn-primary:hover:not(:disabled) { filter:brightness(1.05); transform:translateY(-1px); }
    .btn-ghost { background:rgba(255,255,255,.03); color:var(--blue); border:1px solid rgba(138,114,255,.24); }
    .btn-ghost:hover:not(:disabled) { background:var(--blue-lt); }

    /* 右侧内容 */
    .right-panel {
      flex:1; min-width:0; display:flex; flex-direction:column; overflow:hidden;
      background:linear-gradient(180deg, #111113, #09090b);
      border:1px solid rgba(86,111,160,.2); border-radius:24px; box-shadow:var(--shadow);
    }

    /* 表格区 */
    .table-wrap { flex:1; overflow-y:auto; }
    .table-header { padding:18px 22px; border-bottom:1px solid var(--line);
                    display:flex; align-items:center; justify-content:space-between;
                    background:rgba(255,255,255,.015); flex-shrink:0; gap:16px; flex-wrap:wrap; }
    .table-title { font-size:15px; font-weight:600; color:var(--text1); }
    .table-count { font-size:13px; color:var(--text3); }

    table { width:100%; border-collapse:collapse; font-size:13px; }
    thead th { background:#0f0f12; color:var(--text3); font-weight:500;
               padding:12px 14px; text-align:left; border-bottom:1px solid var(--line);
               white-space:nowrap; position:sticky; top:0; z-index:1; }
    tbody tr { border-bottom:1px solid rgba(32,47,78,.72); transition:background .1s; }
    tbody tr:last-child { border-bottom:none; }
    tbody tr:hover { background:rgba(255,255,255,.02); }
    tbody td { padding:12px 14px; white-space:nowrap; color:var(--text2); }

    .code-cell { font-family:"SF Mono",monospace; font-weight:600; color:var(--blue);
                 font-size:13px; cursor:pointer; text-decoration:underline dotted; }
    input[type=checkbox] { width:15px; height:15px; cursor:pointer; accent-color:var(--blue); }
    .th-check, .td-check { width:36px; text-align:center; }
    .pct-pos { color:var(--red); font-weight:600; }
    .pct-neg { color:var(--green); font-weight:600; }
    .pct-zero { color:var(--text3); }

    /* 分页 */
    .pagination { padding:14px 20px; border-top:1px solid var(--line);
                  display:flex; align-items:center; justify-content:space-between;
                  background:rgba(255,255,255,.015); flex-shrink:0; }
    .page-info { font-size:13px; color:var(--text3); }
    .page-btns { display:flex; gap:4px; }
    .page-btn { width:34px; height:34px; border-radius:12px;
                border:1px solid var(--line-2); background:rgba(255,255,255,.03);
                color:var(--text2); cursor:pointer; font-size:13px;
                display:flex; align-items:center; justify-content:center;
                transition:all .15s; }
    .page-btn:hover { border-color:var(--blue); color:var(--blue); }
    .page-btn.active { background:linear-gradient(135deg, #6f57ff, #8a72ff); border-color:transparent;
                       color:#f8f7ff; font-weight:700; }
    .page-btn:disabled { opacity:.4; cursor:not-allowed; }

    .empty-state { padding:64px 0; text-align:center; color:var(--text3); }
    .empty-state .icon { font-size:36px; margin-bottom:10px; }
    .empty-state p { font-size:14px; }

    /* K线浮层 */
    #kline-popup { position:fixed; z-index:500; background:#0b1628;
                   border:1px solid var(--line-2); border-radius:16px;
                   box-shadow:0 8px 24px rgba(0,0,0,.12); padding:10px;
                   display:none; pointer-events:none; }
    #kline-popup .kline-title { font-size:12px; color:var(--text2);
                                margin-bottom:6px; font-weight:500; }
    #kline-popup img { display:block; width:380px; height:auto; border-radius:4px; }

    /* Toast */
    #toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
             background:rgba(29,33,41,.9); color:#fff; padding:8px 18px;
             border-radius:20px; font-size:13px; opacity:0; transition:opacity .3s;
             pointer-events:none; z-index:999; white-space:nowrap; }
    #toast.show { opacity:1; }

    @media (max-width: 1100px) {
      .app-shell { flex-direction:column; }
      .sidebar {
        width:auto; padding:16px 16px 10px; border-right:none; border-bottom:1px solid rgba(92,122,173,.18);
      }
      .workspace { padding:16px; }
      .layout { flex-direction:column; }
      .left-panel, .right-panel { width:auto; }
    }
  </style>
</head>
<body>
<div class="app-shell">
  <aside class="sidebar">
    <div class="menu-card">
      <div class="menu-title">系统菜单</div>
      <div class="tree">
        <a class="tree-link" href="/month_low"><span>📉</span><span>筛选</span></a>
        <a class="tree-link" href="/watchlist"><span>📌</span><span>自选</span></a>
        <a class="tree-link active" href="/position"><span>💼</span><span>持仓</span></a>
      </div>
    </div>
  </aside>

  <main class="workspace">
    <div class="layout">

  <!-- 左侧面板 -->
  <div class="left-panel">

    <!-- 再次筛选 -->
    <div class="panel-section">
      <div class="section-title">📊 持仓统计</div>
      <div class="stat-grid" id="pos-stat-grid">
        <div class="stat-card"><div class="stat-label">持仓中</div><div class="stat-val blue" id="pos-hold">--</div></div>
        <div class="stat-card"><div class="stat-label">已止盈</div><div class="stat-val green" id="pos-profit">--</div></div>
        <div class="stat-card"><div class="stat-label">已止损</div><div class="stat-val red" id="pos-loss">--</div></div>
        <div class="stat-card"><div class="stat-label">总盈亏</div><div class="stat-val" id="pos-pnl">--</div></div>
      </div>
    </div>

    <!-- 状态筛选 -->
    <div class="panel-section">
      <div class="section-title" style="justify-content:space-between">
        📋 状态筛选
        <span style="font-size:12px;font-weight:400;color:var(--text3);cursor:pointer" onclick="loadPositions()">↻ 刷新</span>
      </div>
      <div class="date-list" id="status-list">
        <div class="date-item active" onclick="filterStatus('all',this)">全部</div>
        <div class="date-item" onclick="filterStatus('hold',this)">持仓中</div>
        <div class="date-item" onclick="filterStatus('profit',this)">已止盈</div>
        <div class="date-item" onclick="filterStatus('loss',this)">已止损</div>
      </div>
    </div>



  </div>

  <!-- 右侧结果 -->
  <div class="right-panel">
    <div class="table-header">
      <span class="table-title">持仓明细</span>
      <span class="table-count" id="table-count"></span>
      <button class="btn btn-primary" id="btn-refresh-price" onclick="refreshPrices()" style="margin-left:auto;padding:6px 16px;font-size:13px">↻ 刷新价格</button>
    </div>
    <div class="table-wrap" id="table-wrap">
      <div class="empty-state">
        <div class="icon">📋</div>
        <p>请选择左侧日期查看筛选结果</p>
      </div>
    </div>
    <div class="pagination" id="pagination" style="display:none">
      <span class="page-info" id="page-info"></span>
      <div class="page-btns" id="page-btns"></div>
    </div>
  </div>

    </div>
  </main>
</div>

<div id="kline-popup">
  <div class="kline-title" id="kline-title"></div>
  <img id="kline-img" src="" alt="日K线图" />
</div>
<div id="toast"></div>

<script>
let allRows = [];
let currentPage = 1;
const PAGE_SIZE = 20;
let currentStatus = 'all';
let realtimeMap = {};  // {code_with_prefix: {price}}

async function loadPositions() {
  const url = currentStatus === 'all' ? '/api/position/list' : '/api/position/list?status=' + currentStatus;
  const rows = await fetch(url).then(r => r.json());
  allRows = rows;
  currentPage = 1;
  updateStats(rows);
  renderPage();
}

async function refreshPrices() {
  const btn = document.getElementById('btn-refresh-price');
  btn.disabled = true; btn.textContent = '⏳ 刷新中...';

  const res = await fetch('/api/position/refresh_prices', { method: 'POST' }).then(r => r.json());

  btn.disabled = false; btn.textContent = '↻ 刷新价格';

  if (!res.ok) { toast(res.msg || '刷新失败'); return; }

  // 更新实时价格 map
  res.results.forEach(r => {
    const key = (r.code.startsWith('6') ? 'sh' : 'sz') + r.code;
    realtimeMap[key] = r.current_price;
  });

  // 统计止损触发数
  const stopped = res.results.filter(r => r.action === 'stop_loss');
  if (stopped.length) {
    toast(`已自动止损 ${stopped.length} 只：${stopped.map(r => r.code).join('、')}`);
  } else {
    toast(`价格已刷新，${res.results.length} 只持仓中`);
  }

  // 重新加载持仓列表（止损后状态变化）
  await loadPositions();
}

function filterStatus(status, el) {
  currentStatus = status;
  document.querySelectorAll('.date-item').forEach(e => e.classList.remove('active'));
  el.classList.add('active');
  loadPositions();
}

function updateStats(rows) {
  const hold   = rows.filter(r => r.status === 'hold').length;
  const profit = rows.filter(r => r.status === 'profit').length;
  const loss   = rows.filter(r => r.status === 'loss').length;
  const closed = rows.filter(r => r.pnl_pct != null && r.status !== 'hold');
  const avgPnl = closed.length ? (closed.reduce((s,r) => s + Number(r.pnl_pct), 0) / closed.length).toFixed(2) : '--';
  document.getElementById('pos-hold').textContent   = hold;
  document.getElementById('pos-profit').textContent = profit;
  document.getElementById('pos-loss').textContent   = loss;
  const pnlEl = document.getElementById('pos-pnl');
  pnlEl.textContent = avgPnl === '--' ? '--' : (avgPnl >= 0 ? '+' : '') + avgPnl + '%';
  pnlEl.className = 'stat-val ' + (avgPnl > 0 ? 'green' : avgPnl < 0 ? 'red' : '');
}

function renderPage() {
  const total = allRows.length;
  const totalPages = Math.max(1, Math.ceil(total / PAGE_SIZE));
  if (currentPage > totalPages) currentPage = totalPages;
  const start = (currentPage - 1) * PAGE_SIZE;
  const pageRows = allRows.slice(start, start + PAGE_SIZE);

  const wrap = document.getElementById('table-wrap');
  const cnt  = document.getElementById('table-count');
  cnt.textContent = total ? '共 ' + total + ' 条' : '';

  if (!total) {
    wrap.innerHTML = '<div class="empty-state"><div class="icon">💼</div><p>暂无持仓记录</p></div>';
    document.getElementById('pagination').style.display = 'none';
    return;
  }

  const today = new Date();
  let html = '<table><thead><tr>' +
    '<th>代码</th><th>名称</th><th>成本价</th><th>实时价</th><th>盈利</th>' +
    '<th>止损价</th><th>买入日期</th><th>持有天数</th><th>状态</th><th>操作</th>' +
    '</tr></thead><tbody>';

  pageRows.forEach(r => {
    const buyDate  = new Date(r.buy_date);
    const holdDays = r.status === 'hold'
      ? Math.floor((today - buyDate) / 86400000)
      : (r.sell_date ? Math.floor((new Date(r.sell_date) - buyDate) / 86400000) : '--');

    const codeKey  = ('6'.includes(r.code[0]) ? 'sh' : 'sz') + r.code;
    const rtPrice  = realtimeMap[codeKey] || null;
    const dispPrice = rtPrice ? rtPrice.toFixed(2) : (r.sell_price ? Number(r.sell_price).toFixed(2) : '--');

    let pnlPct = '--', pnlClass = '';
    if (r.status !== 'hold' && r.pnl_pct != null) {
      pnlPct = (Number(r.pnl_pct) >= 0 ? '+' : '') + Number(r.pnl_pct).toFixed(2) + '%';
      pnlClass = Number(r.pnl_pct) >= 0 ? 'pct-pos' : 'pct-neg';
    } else if (rtPrice && r.buy_price) {
      const p = (rtPrice - Number(r.buy_price)) / Number(r.buy_price) * 100;
      pnlPct = (p >= 0 ? '+' : '') + p.toFixed(2) + '%';
      pnlClass = p >= 0 ? 'pct-pos' : 'pct-neg';
    }

    const statusMap = {'hold':'<span style="color:var(--blue)">持有</span>',
                       'profit':'<span style="color:var(--green)">止盈</span>',
                       'loss':'<span style="color:var(--red)">止损</span>'};
    const ops = r.status === 'hold'
      ? '<button class="btn" style="background:var(--green);color:#fff;padding:4px 10px;font-size:12px" onclick="sellPos(\''+r.code+'\',\'profit\')">止盈</button> ' +
        '<button class="btn" style="background:var(--red);color:#fff;padding:4px 10px;font-size:12px" onclick="sellPos(\''+r.code+'\',\'loss\')">止损</button>'
      : '<span style="color:var(--text3);font-size:12px">' + (r.sell_date||'') + '</span>';

    html += '<tr>' +
      '<td><span class="code-cell" data-code="' + r.code + '" data-name="' + (r.name||'') + '">' + r.code + '</span></td>' +
      '<td>' + (r.name||'-') + '</td>' +
      '<td>' + Number(r.buy_price).toFixed(2) + '</td>' +
      '<td><strong>' + dispPrice + '</strong></td>' +
      '<td><span class="' + pnlClass + '">' + pnlPct + '</span></td>' +
      '<td><span style="cursor:pointer;text-decoration:underline dotted" onclick="editStopLoss(\''+r.code+'\','+r.t_1_low+')">' + (r.t_1_low ? Number(r.t_1_low).toFixed(2) : '--') + '</span></td>' +
      '<td>' + (r.buy_date||'') + '</td>' +
      '<td>' + holdDays + '</td>' +
      '<td>' + (statusMap[r.status]||r.status) + '</td>' +
      '<td style="display:flex;gap:4px">' + ops + '</td>' +
      '</tr>';
  });
  wrap.innerHTML = html + '</tbody></table>';

  // 分页
  const pg   = document.getElementById('pagination');
  const info = document.getElementById('page-info');
  const btns = document.getElementById('page-btns');
  pg.style.display = 'flex';
  info.textContent = '第 ' + currentPage + ' / ' + totalPages + ' 页，共 ' + total + ' 条';
  btns.innerHTML = '';
  const addBtn = (label, page, disabled, active) => {
    const b = document.createElement('button');
    b.className = 'page-btn' + (active ? ' active' : '');
    b.textContent = label; b.disabled = disabled;
    b.onclick = () => { currentPage = page; renderPage(); };
    btns.appendChild(b);
  };
  addBtn('«', 1, currentPage===1, false);
  addBtn('‹', currentPage-1, currentPage===1, false);
  let lo = Math.max(1, currentPage-2), hi = Math.min(totalPages, lo+4);
  lo = Math.max(1, hi-4);
  for (let p = lo; p <= hi; p++) addBtn(p, p, false, p===currentPage);
  addBtn('›', currentPage+1, currentPage===totalPages, false);
  addBtn('»', totalPages, currentPage===totalPages, false);
}

async function sellPos(code, sellType) {
  const rtKey = ('6'.includes(code[0]) ? 'sh' : 'sz') + code;
  const price = realtimeMap[rtKey] || parseFloat(prompt('请输入卖出价格：') || '0');
  if (!price) return;
  const res = await fetch('/api/position/sell', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({code, sell_price: price, sell_type: sellType})
  }).then(r => r.json());
  toast(res.ok ? (sellType==='profit'?'止盈':'止损') + '成功，盈亏 ' + res.pnl_pct + '%' : res.msg);
  loadPositions();
}

async function editStopLoss(code, current) {
  const val = prompt('修改止损价（当前：' + current + '）：', current);
  if (!val || isNaN(val)) return;
  await fetch('/api/position/update_stop_loss', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({code, stop_loss: parseFloat(val)})
  });
  toast('止损价已更新');
  loadPositions();
}

// K线浮层
document.addEventListener('mouseover', (e) => {
  const el = e.target.closest('.code-cell');
  if (!el) return;
  showKline(e, el.dataset.code, el.dataset.name);
});
document.addEventListener('mouseout', (e) => {
  if (e.target.closest('.code-cell')) hideKline();
});
function klineUrl(code) {
  const market = code.startsWith('6') ? '1' : '0';
  return 'http://webquotepic.eastmoney.com/GetPic.aspx?nid=' + market + '.' + code + '&imageType=k&token=44c9d251add88e27b65ed86506f6758a';
}
let _klineTimer = null;
function showKline(e, code, name) {
  clearTimeout(_klineTimer);
  const popup = document.getElementById('kline-popup');
  document.getElementById('kline-title').textContent = code + (name ? '  ' + name : '') + '  日K线';
  document.getElementById('kline-img').src = klineUrl(code);
  popup.style.display = 'block';
  const margin = 12, pw = 400, ph = 230;
  let x = e.clientX + margin, y = e.clientY + margin;
  if (x + pw > window.innerWidth)  x = e.clientX - pw - margin;
  if (y + ph > window.innerHeight) y = e.clientY - ph - margin;
  popup.style.left = x + 'px'; popup.style.top = y + 'px';
}
function hideKline() {
  _klineTimer = setTimeout(() => { document.getElementById('kline-popup').style.display = 'none'; }, 150);
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

loadPositions();
